<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thi hát Karaoke 8/3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <!-- Confetti + Fireworks -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<!-- 🌸 Hoa rơi -->
<div class="flowers"></div>

<!-- 🎵 Nhạc nền -->
<audio id="bgMusic" autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c1c6e6d1b.mp3?filename=romantic-background-110397.mp3" type="audio/mp3">
</audio>

<!-- Banner -->
<section class="banner text-center text-white">
  <h1>🎤 Thi hát Karaoke chào mừng kỷ niệm ngày Quốc tế Phụ nữ 8/3</h1>
  <p class="lead">Tôn vinh giọng hát – Kết nối yêu thương – Lan tỏa cảm xúc</p>
  <div id="countdown" class="countdown mt-3"></div>
</section>

<div class="container py-5">

  <!-- Vote Form -->
  <div class="card shadow-lg p-4 mb-5">
    <h4 class="text-center mb-4">Bình chọn ngay</h4>

    <div class="mb-3">
      <label class="form-label">Chọn đội</label>
      <select id="team" class="form-select">
        <option value="">-- Chọn đội --</option>
        <option>Đội Hoa Hồng</option>
        <option>Đội Hướng Dương</option>
        <option>Đội Tulip</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Điểm (1-10)</label>
      <input type="number" id="score" class="form-control" min="1" max="10">
    </div>

    <div class="mb-3">
      <label class="form-label">Tên người bình chọn</label>
      <input type="text" id="voter" class="form-control">
    </div>

    <button class="btn btn-danger w-100" onclick="submitVote()">Gửi bình chọn</button>
  </div>

  <!-- 🏅 TOP 3 -->
  <h3 class="text-center mb-4">🏆 Bảng xếp hạng Top 3</h3>
  <div id="top3" class="row text-center mb-5"></div>

  <!-- 📊 Biểu đồ -->
  <h4 class="text-center mb-3">Biểu đồ điểm trung bình</h4>
  <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin - Karaoke 8/3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

  <!-- LOGIN -->
  <div id="loginBox" class="card p-4 shadow">
    <h4 class="text-center mb-3">🔐 Admin Login</h4>
    <input type="password" id="password" class="form-control mb-3" placeholder="Nhập mật khẩu">
    <button class="btn btn-danger w-100" onclick="login()">Đăng nhập</button>
  </div>

  <!-- DASHBOARD -->
  <div id="adminPanel" style="display:none;">
    <h3 class="mb-4">📊 Toàn bộ lượt vote</h3>
    <table class="table table-bordered table-striped">
      <thead>
        <tr>
          <th>Thời gian</th>
          <th>Đội</th>
          <th>Điểm</th>
          <th>Người vote</th>
        </tr>
      </thead>
      <tbody id="voteTable"></tbody>
    </table>
  </div>

</div>

<script src="js/config.js"></script>

<script>
const API_URL = CONFIG.API_URL;
const ADMIN_PASSWORD="1908";

function login(){
  const pass=document.getElementById("password").value;
  if(pass===ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    loadVotes();
  }else{
    alert("Sai mật khẩu!");
  }
}

function loadVotes(){
  fetch(API_URL)
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="ok"){
      fetch(API_URL + "?raw=1")
      .then(res=>res.json())
      .then(all=>{
        const tbody=document.getElementById("voteTable");
        tbody.innerHTML="";
        all.rows.forEach(r=>{
          tbody.innerHTML+=`
            <tr>
              <td>${r[0]}</td>
              <td>${r[1]}</td>
              <td>${r[2]}</td>
              <td>${r[3]}</td>
            </tr>
          `;
        });
      });
    }
  });
}
</script>

</body>
</html>
